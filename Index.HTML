<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Renan Rodrigues - Full-Stack Developer Portfolio. Terminal-style interactive portfolio showcasing skills, projects and contact info.">
    <meta name="author" content="Renan Rodrigues">
    <meta name="keywords" content="developer, portfolio, frontend, backend, web development, Renan Rodrigues">
    <title>Renan.dev — Terminal Portfolio</title>

    <!-- Google Fonts: Fira Code -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Matrix Rain Canvas Background -->
    <canvas id="matrix-canvas"></canvas>

    <!-- CRT Overlay Effects -->
    <div class="crt-overlay"></div>
    <div class="scanline-overlay"></div>

    <!-- Main Terminal Container -->
    <main class="terminal" id="terminal">

        <!-- Terminal Title Bar -->
        <header class="terminal-titlebar">
            <div class="titlebar-buttons">
                <span class="btn-close"></span>
                <span class="btn-minimize"></span>
                <span class="btn-maximize"></span>
            </div>
            <div class="titlebar-title">
                <span class="titlebar-icon">▸</span>
                renan@portfolio:~
            </div>
            <div class="titlebar-status">
                <span class="status-dot online"></span>
                <span id="clock">00:00:00</span>
            </div>
        </header>

        <!-- Terminal Output Area -->
        <section class="terminal-body" id="terminal-body">
            <div id="output"></div>
        </section>

        <!-- Terminal Input Prompt -->
        <footer class="terminal-input-area">
            <div class="prompt-line">
                <span class="prompt-user">renan</span>
                <span class="prompt-at">@</span>
                <span class="prompt-host">portfolio</span>
                <span class="prompt-colon">:</span>
                <span class="prompt-path">~</span>
                <span class="prompt-dollar">$</span>
                <input
                    type="text"
                    id="terminal-input"
                    autocomplete="off"
                    spellcheck="false"
                    autofocus
                    aria-label="Terminal command input"
                >
            </div>
        </footer>

    </main>

    <!-- Footer -->
    <footer class="page-footer">
        <p>Built with <span class="heart">♥</span> by Renan Rodrigues &copy; <span id="year"></span></p>
    </footer>

    <script src="Index.js"></script>
</body>
</html>
